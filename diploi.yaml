diploiVersion: v1.0
type: component
name: React + Vite
description: Official Diploi component for React + Vite

supportsAdditionalHosts: { serviceName: 'app' }

hosts:
  - name: App
    identifier: app
    port: 5173

images:
  - identifier: app
    prebuildImage: ghcr.io/diploi/component-react-vite:[tag]

environmentVariables:
  - identifier: __VITE_ADDITIONAL_SERVER_ALLOWED_HOSTS
    defaultValue: '.diploi.me'

storage:
  - identifier: build
    sizeMiB: 8192
    stages:
      - staging
      - production
